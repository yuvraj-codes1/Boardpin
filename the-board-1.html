<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Board — Save it, share it</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=JetBrains+Mono:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap');

  :root{
    --cork: #4a3421;
    --cork-dark: #3a2818;
    --paper: #f2ead8;
    --paper-dim: #e8ddc4;
    --ink: #2b241a;
    --ink-soft: #6b5f4d;
    --thread: #c9a961;

    --cat-ai: #d64545;
    --cat-art: #7b5fc4;
    --cat-startup: #e08a2b;
    --cat-pc: #2f8f7a;
    --cat-claude: #c1673f;
    --cat-host: #3e7fb0;
    --cat-app: #b83d7a;
    --cat-api: #4a9e3f;
    --cat-yt: #d6304f;
    --cat-other: #8a7f6a;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.04), transparent 60%),
      var(--cork);
    background-color: var(--cork);
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px),
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.15) 0%, transparent 3%),
      radial-gradient(circle at 70% 60%, rgba(0,0,0,0.12) 0%, transparent 2.5%),
      radial-gradient(circle at 45% 80%, rgba(0,0,0,0.1) 0%, transparent 2%),
      radial-gradient(circle at 85% 15%, rgba(0,0,0,0.13) 0%, transparent 2.5%);
    font-family:'JetBrains Mono', monospace;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  ::selection{ background:var(--thread); color:var(--cork-dark); }

  /* ---------- Auth overlay ---------- */
  .auth-overlay{
    position:fixed; inset:0;
    background:var(--cork-dark);
    display:flex; align-items:center; justify-content:center;
    z-index:100;
    padding:20px;
  }
  .auth-card{
    background:var(--paper);
    border-radius:2px;
    padding:30px 26px 24px;
    max-width:360px;
    width:100%;
    box-shadow:0 14px 30px rgba(0,0,0,0.4);
    transform:rotate(-0.4deg);
  }
  .auth-title{
    font-family:'Permanent Marker', cursive;
    font-size:1.6rem;
    color:var(--ink);
    margin:0 0 4px;
    text-align:center;
  }
  .auth-sub{
    font-family:'Caveat', cursive;
    font-size:1.05rem;
    color:var(--ink-soft);
    text-align:center;
    margin-bottom:18px;
    font-weight:700;
  }
  .auth-card input{
    width:100%;
    font-family:'JetBrains Mono', monospace;
    font-size:0.9rem;
    padding:10px 12px;
    border:2px dashed var(--ink-soft);
    background:var(--paper-dim);
    color:var(--ink);
    border-radius:2px;
    outline:none;
    margin-bottom:10px;
  }
  .auth-card input:focus{ border-color:var(--cork); }
  .auth-btn{
    width:100%;
    font-family:'Permanent Marker', cursive;
    font-size:1rem;
    background:var(--cork);
    color:var(--paper);
    border:none;
    border-radius:2px;
    padding:11px 18px;
    cursor:pointer;
    margin-top:4px;
    transition:background 0.15s ease;
  }
  .auth-btn:hover{ background:var(--cork-dark); }
  .auth-btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .auth-toggle{
    text-align:center;
    font-size:0.8rem;
    color:var(--ink-soft);
    margin-top:14px;
  }
  .auth-toggle a{ color:var(--cork); font-weight:600; cursor:pointer; text-decoration:underline; }
  .auth-status{
    font-size:0.78rem;
    margin-top:10px;
    min-height:1em;
    text-align:center;
  }
  .auth-status.err{ color:#a02218; font-weight:600; }
  .auth-status.ok{ color:#2f6e2f; font-weight:600; }

  /* ---------- Account bar ---------- */
  .account-bar{
    max-width:1200px;
    margin:0 auto 6px;
    padding:0 16px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    font-size:0.8rem;
    color:var(--paper);
  }
  .account-bar .email{ opacity:0.85; }
  .account-bar button{
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem;
    background:rgba(255,255,255,0.1);
    color:var(--paper);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:14px;
    padding:5px 12px;
    cursor:pointer;
  }
  .account-bar button:hover{ background:rgba(255,255,255,0.18); }

  /* ---------- Header ---------- */
  header{
    padding:36px 20px 24px;
    text-align:center;
    position:relative;
  }
  .board-title{
    font-family:'Permanent Marker', cursive;
    color:var(--paper);
    font-size:clamp(2.2rem, 6vw, 3.6rem);
    letter-spacing:1px;
    transform:rotate(-1.5deg);
    display:inline-block;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
    margin:0;
  }
  .board-sub{
    font-family:'Caveat', cursive;
    font-size:1.3rem;
    color:var(--thread);
    margin-top:2px;
    font-weight:700;
  }

  /* ---------- Add-link note ---------- */
  .composer-wrap{
    max-width:760px;
    margin:0 auto 30px;
    padding:0 16px;
  }
  .composer{
    background:var(--paper);
    border-radius:2px;
    padding:22px 22px 18px;
    box-shadow:
      0 10px 20px rgba(0,0,0,0.35),
      0 2px 0 rgba(0,0,0,0.1) inset;
    transform:rotate(-0.4deg);
    position:relative;
  }
  .composer::before{
    content:'';
    position:absolute;
    top:-14px; left:50%;
    transform:translateX(-50%);
    width:22px; height:22px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #e8534a, #a02218);
    box-shadow:0 3px 5px rgba(0,0,0,0.5);
  }
  .composer input[type=text], .composer input[type=url]{
    width:100%;
    font-family:'JetBrains Mono', monospace;
    font-size:0.95rem;
    padding:11px 12px;
    border:2px dashed var(--ink-soft);
    background:var(--paper-dim);
    color:var(--ink);
    border-radius:2px;
    outline:none;
    margin-bottom:10px;
  }
  .composer input:focus{ border-color:var(--cork); }
  .composer input::placeholder{ color:var(--ink-soft); opacity:0.8; }

  .row{ display:flex; gap:10px; flex-wrap:wrap; }
  .row > *{ flex:1; min-width:150px; }

  select#catSelect{
    font-family:'JetBrains Mono', monospace;
    font-size:0.9rem;
    padding:11px 10px;
    border:2px solid var(--ink-soft);
    background:var(--paper-dim);
    color:var(--ink);
    border-radius:2px;
    outline:none;
  }

  .pin-btn{
    font-family:'Permanent Marker', cursive;
    font-size:1.05rem;
    letter-spacing:0.5px;
    background:var(--cork);
    color:var(--paper);
    border:none;
    border-radius:2px;
    padding:11px 18px;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.15s ease;
    flex:0 0 auto;
    min-width:140px;
  }
  .pin-btn:hover{ background:var(--cork-dark); transform:translateY(-2px); }
  .pin-btn:active{ transform:translateY(0px) scale(0.98); }
  .pin-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .composer-hint{
    font-size:0.75rem;
    color:var(--ink-soft);
    margin-top:8px;
  }
  .composer-status{
    font-size:0.78rem;
    margin-top:6px;
    min-height:1em;
  }
  .composer-status.err{ color:#a02218; font-weight:600; }
  .composer-status.ok{ color:#2f6e2f; font-weight:600; }

  /* ---------- Filter bar ---------- */
  .filterbar{
    max-width:1200px;
    margin:0 auto 8px;
    padding:0 16px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
  }
  .chip{
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
    font-weight:600;
    padding:7px 13px;
    border-radius:20px;
    cursor:pointer;
    border:2px solid transparent;
    background:rgba(255,255,255,0.08);
    color:var(--paper);
    transition:all 0.15s ease;
    white-space:nowrap;
  }
  .chip:hover{ background:rgba(255,255,255,0.16); }
  .chip.active{
    background:var(--paper);
    color:var(--ink);
    border-color:var(--thread);
  }
  .chip .dot{
    display:inline-block;
    width:8px; height:8px;
    border-radius:50%;
    margin-right:6px;
    vertical-align:middle;
  }

  .searchwrap{
    max-width:1200px;
    margin:0 auto 30px;
    padding:0 16px;
    display:flex;
    justify-content:center;
  }
  .searchwrap input{
    width:100%;
    max-width:420px;
    font-family:'JetBrains Mono', monospace;
    padding:9px 14px;
    border-radius:20px;
    border:none;
    background:rgba(255,255,255,0.12);
    color:var(--paper);
    outline:none;
    font-size:0.85rem;
  }
  .searchwrap input::placeholder{ color:rgba(242,234,216,0.5); }
  .searchwrap input:focus{ background:rgba(255,255,255,0.2); }

  /* ---------- Board grid ---------- */
  .board{
    max-width:1300px;
    margin:0 auto;
    padding:10px 20px 80px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:26px;
    align-items:start;
  }

  .card{
    background:var(--paper);
    border-radius:2px;
    padding:14px 14px 12px;
    box-shadow:
      0 8px 16px rgba(0,0,0,0.32),
      0 1px 0 rgba(255,255,255,0.4) inset;
    position:relative;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    cursor:default;
    text-decoration:none;
    color:inherit;
    display:block;
  }
  .card:hover{
    transform:rotate(0deg) scale(1.02) !important;
    box-shadow:0 14px 26px rgba(0,0,0,0.4);
    z-index:5;
  }
  .card .pin{
    position:absolute;
    top:-10px; left:50%;
    transform:translateX(-50%);
    width:17px; height:17px;
    border-radius:50%;
    box-shadow:0 3px 5px rgba(0,0,0,0.5);
  }
  .card-thumb{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    border-radius:1px;
    margin-bottom:9px;
    background:var(--paper-dim);
    display:block;
  }
  .card-cat{
    font-size:0.66rem;
    font-weight:700;
    letter-spacing:0.5px;
    text-transform:uppercase;
    margin-bottom:5px;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .card-cat .dot{ width:7px; height:7px; border-radius:50%; display:inline-block; }
  .card-title{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:1.3rem;
    line-height:1.15;
    margin:0 0 6px;
    word-break:break-word;
    color:var(--ink);
  }
  .card-url{
    font-size:0.68rem;
    color:var(--ink-soft);
    word-break:break-all;
    display:block;
    margin-bottom:8px;
    line-height:1.4;
  }
  .card-foot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:0.65rem;
    color:var(--ink-soft);
    border-top:1px dashed rgba(0,0,0,0.15);
    padding-top:7px;
  }
  .del-btn{
    background:none;
    border:none;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:0.9rem;
    padding:2px 5px;
    line-height:1;
    opacity:0.5;
    transition:opacity 0.15s;
  }
  .del-btn:hover{ opacity:1; color:#a02218; }

  .empty-state{
    max-width:1300px;
    margin:60px auto;
    text-align:center;
    color:var(--paper);
    opacity:0.7;
    padding:0 20px;
  }
  .empty-state .big{
    font-family:'Permanent Marker', cursive;
    font-size:1.6rem;
    display:block;
    margin-bottom:6px;
  }

  .stat-strip{
    text-align:center;
    color:var(--thread);
    font-size:0.75rem;
    padding-bottom:8px;
    letter-spacing:0.5px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  @media (max-width:480px){
    .row > *{ min-width:100%; }
    .board{ grid-template-columns:1fr 1fr; gap:16px; padding:10px 12px 60px;}
  }
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2 class="auth-title" id="authTitle">📌 The Board</h2>
    <div class="auth-sub" id="authSub">log in to see your pins</div>
    <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
    <input type="password" id="authPassword" placeholder="password (min 6 characters)" autocomplete="current-password">
    <button class="auth-btn" id="authSubmitBtn">Log in</button>
    <div class="auth-status" id="authStatus"></div>
    <div class="auth-toggle" id="authToggle">Don't have an account? <a id="authToggleLink">Sign up</a></div>
  </div>
</div>

<div class="account-bar" id="accountBar" style="display:none;">
  <span class="email" id="accountEmail"></span>
  <button id="logoutBtn">Log out</button>
</div>

<header>
  <h1 class="board-title">📌 The Board</h1>
  <div class="board-sub">drop a link, pin it, find it later</div>
</header>

<div class="composer-wrap">
  <div class="composer">
    <input type="url" id="urlInput" placeholder="Paste a YouTube / Instagram / any link here…" autocomplete="off">
    <input type="text" id="titleInput" placeholder="Give it a short label (optional — we'll guess one)" autocomplete="off">
    <div class="row">
      <select id="catSelect"></select>
      <button class="pin-btn" id="pinBtn">📌 Pin it</button>
    </div>
    <div class="composer-status" id="status"></div>
    <div class="composer-hint">Your pins are private — only you can see and remove them.</div>
  </div>
</div>

<div class="filterbar" id="filterBar"></div>
<div class="searchwrap"><input type="text" id="searchInput" placeholder="search titles or urls…"></div>
<div class="stat-strip" id="statStrip"></div>

<div class="board" id="board"></div>
<div class="empty-state" id="emptyState" style="display:none;">
  <span class="big">the board is empty</span>
  paste a link above to be the first pin.
</div>

<script>
const CATEGORIES = [
  { id:'ai',      label:'AI Information',        color:'var(--cat-ai)',      hex:'#d64545' },
  { id:'art',     label:'2D/3D Art & Animation',  color:'var(--cat-art)',     hex:'#7b5fc4' },
  { id:'startup', label:'Startup',                color:'var(--cat-startup)',hex:'#e08a2b' },
  { id:'pc',      label:'Laptop & PC',            color:'var(--cat-pc)',     hex:'#2f8f7a' },
  { id:'claude',  label:'Claude',                 color:'var(--cat-claude)', hex:'#c1673f' },
  { id:'host',    label:'Hosting & Deploy',       color:'var(--cat-host)',   hex:'#3e7fb0' },
  { id:'app',     label:'App Making',             color:'var(--cat-app)',    hex:'#b83d7a' },
  { id:'api',     label:'API',                    color:'var(--cat-api)',    hex:'#4a9e3f' },
  { id:'yt',      label:'YouTube Info',           color:'var(--cat-yt)',     hex:'#d6304f' },
  { id:'other',   label:'Other',                  color:'var(--cat-other)', hex:'#8a7f6a' },
];
const catMap = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

let links = [];
let activeFilter = 'all';
let searchTerm = '';

const board = document.getElementById('board');
const emptyState = document.getElementById('emptyState');
const filterBar = document.getElementById('filterBar');
const catSelect = document.getElementById('catSelect');
const statStrip = document.getElementById('statStrip');

function buildCatSelect(){
  catSelect.innerHTML = CATEGORIES.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
}

function buildFilterBar(){
  const chips = [`<div class="chip ${activeFilter==='all'?'active':''}" data-cat="all">All</div>`]
    .concat(CATEGORIES.map(c => `<div class="chip ${activeFilter===c.id?'active':''}" data-cat="${c.id}"><span class="dot" style="background:${c.hex}"></span>${c.label}</div>`));
  filterBar.innerHTML = chips.join('');
  filterBar.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeFilter = chip.dataset.cat;
      buildFilterBar();
      render();
    });
  });
}

function detectPlatform(url){
  try{
    const u = new URL(url);
    const h = u.hostname.replace('www.','');
    if (h.includes('youtube.com') || h.includes('youtu.be')) return 'youtube';
    if (h.includes('instagram.com')) return 'instagram';
    if (h.includes('twitter.com') || h.includes('x.com')) return 'twitter';
    if (h.includes('github.com')) return 'github';
    if (h.includes('tiktok.com')) return 'tiktok';
    return 'generic';
  }catch(e){ return 'generic'; }
}

function getYoutubeId(url){
  try{
    const u = new URL(url);
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
    if (u.searchParams.get('v')) return u.searchParams.get('v');
    const m = u.pathname.match(/\/(embed|shorts)\/([a-zA-Z0-9_-]+)/);
    if (m) return m[2];
  }catch(e){}
  return null;
}

function guessTitle(url, platform){
  try{
    const u = new URL(url);
    if (platform==='youtube') return 'YouTube video';
    if (platform==='instagram') return 'Instagram post';
    if (platform==='twitter') return 'X / Twitter post';
    if (platform==='github') return 'GitHub — ' + u.pathname.split('/').filter(Boolean).slice(0,2).join('/');
    if (platform==='tiktok') return 'TikTok video';
    return u.hostname.replace('www.','');
  }catch(e){ return 'Saved link'; }
}

function randTilt(seed){
  // deterministic-ish small rotation per card based on string
  let h = 0;
  for (let i=0;i<seed.length;i++) h = (h*31 + seed.charCodeAt(i)) % 1000;
  return ((h % 5) - 2) * 0.9; // -1.8deg to 1.8deg
}

// ---------- Supabase config ----------
const SUPABASE_URL = 'https://nphlijrjmlemoeggiglu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5waGxpanJqbWxlbW9lZ2dpZ2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzQ3NzYsImV4cCI6MjA5ODc1MDc3Nn0.N4CX2EbihTiTUzVLYwROyqrSSy1Q9o1II90JuOjYs68';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let authMode = 'login'; // 'login' | 'signup'

const authOverlay = document.getElementById('authOverlay');
const authTitle = document.getElementById('authTitle');
const authSub = document.getElementById('authSub');
const authEmail = document.getElementById('authEmail');
const authPassword = document.getElementById('authPassword');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const authStatus = document.getElementById('authStatus');
const authToggle = document.getElementById('authToggle');
const authToggleLink = document.getElementById('authToggleLink');
const accountBar = document.getElementById('accountBar');
const accountEmail = document.getElementById('accountEmail');
const logoutBtn = document.getElementById('logoutBtn');

function showAuthStatus(msg, isErr){
  authStatus.textContent = msg;
  authStatus.className = 'auth-status ' + (isErr ? 'err' : 'ok');
}

function setAuthMode(mode){
  authMode = mode;
  showAuthStatus('', false);
  if (mode === 'signup'){
    authTitle.textContent = '📌 Join the Board';
    authSub.textContent = 'create an account to start pinning';
    authSubmitBtn.textContent = 'Sign up';
    authToggle.innerHTML = 'Already have an account? <a id="authToggleLink">Log in</a>';
  } else {
    authTitle.textContent = '📌 The Board';
    authSub.textContent = 'log in to see your pins';
    authSubmitBtn.textContent = 'Log in';
    authToggle.innerHTML = 'Don\'t have an account? <a id="authToggleLink">Sign up</a>';
  }
  document.getElementById('authToggleLink').addEventListener('click', () => {
    setAuthMode(authMode === 'login' ? 'signup' : 'login');
  });
}

async function handleAuthSubmit(){
  const email = authEmail.value.trim();
  const password = authPassword.value;
  if (!email || !password){ showAuthStatus('Enter an email and password.', true); return; }
  if (password.length < 6){ showAuthStatus('Password must be at least 6 characters.', true); return; }

  authSubmitBtn.disabled = true;
  authSubmitBtn.textContent = authMode === 'signup' ? 'Signing up…' : 'Logging in…';

  try{
    if (authMode === 'signup'){
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      if (data.session){
        // Email confirmation is off — logged in immediately
        onLoggedIn(data.session.user);
      } else {
        showAuthStatus('Check your email to confirm your account, then log in.', false);
        setAuthMode('login');
      }
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      onLoggedIn(data.user);
    }
  }catch(e){
    showAuthStatus(e.message || 'Something went wrong — try again.', true);
  }finally{
    authSubmitBtn.disabled = false;
    authSubmitBtn.textContent = authMode === 'signup' ? 'Sign up' : 'Log in';
  }
}

function onLoggedIn(user){
  currentUser = user;
  authOverlay.style.display = 'none';
  accountBar.style.display = 'flex';
  accountEmail.textContent = user.email;
  loadLinks();
}

function onLoggedOut(){
  currentUser = null;
  authOverlay.style.display = 'flex';
  accountBar.style.display = 'none';
  links = [];
  render();
  authEmail.value = '';
  authPassword.value = '';
  setAuthMode('login');
}

authSubmitBtn.addEventListener('click', handleAuthSubmit);
authPassword.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuthSubmit(); });
logoutBtn.addEventListener('click', async () => {
  await sb.auth.signOut();
  onLoggedOut();
});

async function initAuth(){
  setAuthMode('login');
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user){
    onLoggedIn(session.user);
  }
}

// Map a Supabase row (snake_case) to the app's link object shape
function rowToLink(row){
  return {
    id: row.id,
    url: row.url,
    title: row.title,
    category: row.category,
    platform: row.platform,
    youtubeId: row.youtube_id,
    createdAt: row.created_at ? new Date(row.created_at).getTime() : Date.now()
  };
}

async function loadLinks(){
  if (!currentUser){ links = []; render(); return; }
  try{
    const { data, error } = await sb
      .from('links')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    links = (data || []).map(rowToLink);
  }catch(e){
    console.error('loadLinks failed:', e);
    links = [];
    showStatus('Could not load your board — check your connection.', true);
  }
  render();
}

async function saveLinkToDb(entry){
  const { error } = await sb.from('links').insert({
    id: entry.id,
    url: entry.url,
    title: entry.title,
    category: entry.category,
    platform: entry.platform,
    youtube_id: entry.youtubeId,
    created_at: new Date(entry.createdAt).toISOString(),
    user_id: currentUser.id,
    user_name: currentUser.email
  });
  if (error) throw error;
}

async function deleteLinkFromDb(id){
  const { error } = await sb.from('links').delete().eq('id', id);
  if (error) throw error;
}

function showStatus(msg, isErr){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'composer-status ' + (isErr ? 'err' : 'ok');
  setTimeout(() => { el.textContent=''; el.className='composer-status'; }, 3000);
}

async function addLink(){
  if (!currentUser){ showStatus('Log in to pin links.', true); return; }
  const urlInput = document.getElementById('urlInput');
  const titleInput = document.getElementById('titleInput');
  const url = urlInput.value.trim();
  const customTitle = titleInput.value.trim();
  const cat = catSelect.value;
  const pinBtn = document.getElementById('pinBtn');

  if (!url){ showStatus('Paste a link first.', true); return; }
  let validUrl = url;
  if (!/^https?:\/\//i.test(validUrl)) validUrl = 'https://' + validUrl;
  try{ new URL(validUrl); }catch(e){ showStatus('That doesn\'t look like a valid link.', true); return; }

  pinBtn.disabled = true;
  pinBtn.textContent = 'Pinning…';

  const platform = detectPlatform(validUrl);
  const entry = {
    id: crypto.randomUUID(),
    url: validUrl,
    title: customTitle || guessTitle(validUrl, platform),
    category: cat,
    platform: platform,
    youtubeId: platform==='youtube' ? getYoutubeId(validUrl) : null,
    createdAt: Date.now()
  };

  links.unshift(entry);
  render();
  try{
    await saveLinkToDb(entry);
    urlInput.value = '';
    titleInput.value = '';
    showStatus('Pinned to the board!', false);
  }catch(e){
    console.error('addLink failed:', e);
    links = links.filter(l => l.id !== entry.id); // roll back
    render();
    showStatus('Could not save — try again.', true);
  }
  pinBtn.disabled = false;
  pinBtn.textContent = '📌 Pin it';
}

async function deleteLink(id){
  const removed = links.find(l => l.id === id);
  links = links.filter(l => l.id !== id);
  render();
  try{
    await deleteLinkFromDb(id);
  }catch(e){
    console.error('deleteLink failed:', e);
    if (removed) links.unshift(removed); // roll back
    render();
    showStatus('Could not remove — try again.', true);
  }
}

function render(){
  let visible = links;
  if (activeFilter !== 'all') visible = visible.filter(l => l.category === activeFilter);
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    visible = visible.filter(l => l.title.toLowerCase().includes(t) || l.url.toLowerCase().includes(t));
  }

  statStrip.textContent = `${links.length} pinned total · showing ${visible.length}`;

  if (visible.length === 0){
    board.innerHTML = '';
    emptyState.style.display = 'block';
    emptyState.querySelector('.big').textContent = links.length === 0 ? 'the board is empty' : 'nothing matches';
    return;
  }
  emptyState.style.display = 'none';

  board.innerHTML = visible.map(l => {
    const cat = catMap[l.category] || catMap.other;
    const tilt = randTilt(l.id);
    const thumb = l.platform === 'youtube' && l.youtubeId
      ? `<img class="card-thumb" src="https://i.ytimg.com/vi/${l.youtubeId}/hqdefault.jpg" loading="lazy" alt="">`
      : '';
    const date = new Date(l.createdAt);
    const dateStr = date.toLocaleDateString(undefined, {month:'short', day:'numeric'});
    return `
      <a class="card" href="${l.url}" target="_blank" rel="noopener noreferrer" style="transform:rotate(${tilt}deg)">
        <div class="pin" style="background:${cat.hex}"></div>
        ${thumb}
        <div class="card-cat"><span class="dot" style="background:${cat.hex}"></span>${cat.label}</div>
        <div class="card-title">${escapeHtml(l.title)}</div>
        <span class="card-url">${escapeHtml(l.url)}</span>
        <div class="card-foot">
          <span>${dateStr}</span>
          <button class="del-btn" data-id="${l.id}" title="Remove pin" onclick="event.preventDefault(); event.stopPropagation(); removePin('${l.id}')">✕</button>
        </div>
      </a>
    `;
  }).join('');
}

function removePin(id){
  if (confirm('Remove this pin from the board?')) deleteLink(id);
}
window.removePin = removePin;

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('pinBtn').addEventListener('click', addLink);
document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key==='Enter') addLink(); });
document.getElementById('titleInput').addEventListener('keydown', e => { if (e.key==='Enter') addLink(); });
document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; render(); });

buildCatSelect();
buildFilterBar();
initAuth();
setInterval(() => { if (currentUser) loadLinks(); }, 8000); // pick up pins/deletes made elsewhere by this user
</script>
</body>
</html>
